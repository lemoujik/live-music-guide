<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guide de poche des salles de concerts de Paris</title>

<style>

:root{
    --bg:#0b1020;
    --card:#151c2e;
    --card2:#1d2638;
    --accent:#ff4d6d;
    --accent2:#6d9fff;
    --text:#ffffff;
    --muted:#b9c2d3;
    --border:#283246;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    background:
        radial-gradient(circle at top,#233150 0%,#0b1020 60%);
    color:var(--text);
    max-width:850px;
    margin:auto;
    padding:20px;
    min-height:100vh;
}

header{
    background:linear-gradient(
        135deg,
        #ff4d6d,
        #6d9fff
    );
    padding:35px 25px;
    border-radius:24px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    margin-bottom:25px;
}

header h1{
    font-size:2rem;
    margin-bottom:10px;
}

header p{
    opacity:.9;
    line-height:1.5;
}

.stats{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.badge{
    background:rgba(255,255,255,.15);
    padding:8px 14px;
    border-radius:30px;
    font-weight:600;
}

details.category{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    margin-bottom:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.category summary{
    list-style:none;
    cursor:pointer;
    padding:18px;
    font-size:1.1rem;
    font-weight:700;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.category summary::-webkit-details-marker{
    display:none;
}

.category summary:hover{
    background:#1c2538;
}

.venues{
    border-top:1px solid var(--border);
}

details.venue{
    border-bottom:1px solid var(--border);
}

details.venue:last-child{
    border-bottom:none;
}

.venue summary{
    list-style:none;
    cursor:pointer;
    padding:18px;
}

.venue summary::-webkit-details-marker{
    display:none;
}

.venue summary:hover{
    background:#1d2638;
}

.venue-name{
    font-size:1.1rem;
    font-weight:700;
}

.venue-details{
    background:#101725;
    padding:18px;
}

.capacity{
    display:inline-block;
    background:rgba(255,77,109,.15);
    color:#ff6f8a;
    padding:8px 12px;
    border-radius:30px;
    font-weight:700;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.btn{
    text-decoration:none;
    text-align:center;
    padding:12px;
    border-radius:12px;
